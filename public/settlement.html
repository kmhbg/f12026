<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e10600" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>F1 Betting 2026 – Rättning racebet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-row">
        <h1>F1 Betting 2026 – Rättning racebet</h1>
        <nav class="header-nav">
          <a href="/index.html">Spel</a>
          <a href="/settlement.html" class="active">Rättning</a>
          <a href="/dashboard.html">Dashboard</a>
          <a href="/app-installation.html">App</a>
        </nav>
      </div>
    </header>

    <main>
      <section>
        <h2>Välj race</h2>
        <div class="section-block">
          <label for="settlement-race-select">Race:</label>
          <select id="settlement-race-select">
            <option value="">-- Välj race --</option>
          </select>
        </div>
        <p id="settlement-status" class="info"></p>
      </section>

      <section class="section-block">
        <h2>Resultat (topp 3)</h2>
        <div class="table-scroll">
          <table id="settlement-result-table">
            <thead>
              <tr>
                <th>Pos</th>
                <th>Förare</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="section-block">
        <h2>Vinnare</h2>
        <div class="table-scroll">
          <table id="settlement-winners-table">
            <thead>
              <tr>
                <th>Användare</th>
                <th>Belopp per vinnare</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="section-block">
        <h2>Sammanfattning</h2>
        <p class="info">Totalt antal bett: <span id="settlement-total-bets">-</span></p>
        <p class="info">Total vinstpott: <span id="settlement-payout-total">-</span></p>
        <p class="info">Samlad pott: <span id="settlement-pot">-</span></p>
      </section>
    </main>

    <script src="settlement.js"></script>
  </body>
</html>
