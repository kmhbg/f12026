<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e10600" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>F1 Betting 2026 – Årsbett Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-row">
        <h1>F1 Betting 2026 – Årsbett Dashboard</h1>
        <nav class="header-nav">
          <a href="/index.html">Spel</a>
          <a href="/settlement.html">Rättning</a>
          <a href="/dashboard.html" class="active">Dashboard</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section-block">
        <h2>Sammanställning mot tabellen</h2>
        <p class="info">
          Visar nuvarande ställning jämfört med respektive användares årsbett.
        </p>
        <p id="dashboard-updated" class="info"></p>
      </section>

      <section class="section-block">
        <h2>Racebet – tabell</h2>
        <p class="info">Vinst = 1 poäng. Delas om flera har rätt.</p>
        <div class="table-scroll">
          <table id="race-leaderboard">
            <thead>
              <tr>
                <th>Plats</th>
                <th>Användare</th>
                <th>Poäng</th>
                <th>Vinster</th>
                <th>Total (race + årsbet)</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <p id="race-updated" class="info"></p>
      </section>

      <section id="dashboard-container" class="dashboard-grid"></section>
    </main>

    <script src="dashboard.js"></script>
  </body>
</html>
